<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikâha Doğru</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%); 
            color: #3a3f47;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BULUTLAR --- */
        .clouds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: #ffffff;
            border-radius: 50px;
            opacity: 0.85; 
            filter: blur(5px); 
            animation: moveClouds linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }

        .cloud1 { width: 200px; height: 60px; top: 15%; left: -250px; animation-duration: 45s; }
        .cloud1::before { width: 100px; height: 100px; top: -50px; left: 20px; }
        .cloud1::after { width: 120px; height: 120px; top: -70px; right: 20px; }

        .cloud2 { width: 150px; height: 45px; top: 40%; left: -200px; opacity: 0.7; transform: scale(0.8); animation-duration: 35s; animation-delay: 10s; }
        .cloud2::before { width: 70px; height: 70px; top: -35px; left: 15px; }
        .cloud2::after { width: 90px; height: 90px; top: -50px; right: 15px; }

        @keyframes moveClouds {
            0% { left: -300px; }
            100% { left: 100vw; }
        }

        /* --- MANZARA: UZAKTAKİ KARLI DAĞLAR --- */
        .scenery {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh; /* Ekranın alt %35'lik kısmı */
            z-index: 0; /* Kartın arkasında kalır */
            pointer-events: none;
        }
        
        .mountains {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            opacity: 0.85; /* Uzakta oldukları için hafif şeffaf */
        }

        /* --- ISPARTA GÜLLERİ --- */
        .roses-container {
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 2.5rem;
            z-index: 2; /* Kartın ve dağların önünde */
            /* Kırmızı gülü Isparta gülüne (pembemsi) çevirmek için hafif renk filtresi */
            filter: hue-rotate(-25deg) brightness(1.1) drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .rose {
            animation: gentleBreeze 4s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        /* Bazı güller daha küçük ve farklı hızda sallanır */
        .rose:nth-child(even) {
            font-size: 1.8rem;
            animation-duration: 3s;
            animation-delay: -2s;
            margin-bottom: 8px;
        }

        @keyframes gentleBreeze {
            0% { transform: rotate(-6deg); }
            100% { transform: rotate(6deg); }
        }

        /* --- ANA İÇERİK KARTI --- */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 550px;
            width: 90%;
            padding: 50px 30px;
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
            margin: 20px;
            box-sizing: border-box;
        }
        
        .leaf-icon { font-size: 1.8rem; color: #5c6e65; margin-bottom: 15px; opacity: 0.9; }
        h1 { font-family: 'Georgia', serif; font-size: 2.6rem; color: #4a524d; margin: 0 0 45px 0; font-weight: 400; letter-spacing: 1px; }
        .countdown { display: flex; justify-content: center; gap: 12px; margin-bottom: 45px; }
        .time-box { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(255, 255, 255, 0.9); padding: 16px 12px; border-radius: 16px; min-width: 75px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .time-box span { display: block; font-size: 2.2rem; font-weight: 300; color: #3a3f47; line-height: 1; }
        .time-box label { font-size: 0.75rem; color: #7a827c; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 8px; display: block; }
        .details { border-top: 1px dashed rgba(180, 190, 185, 0.5); padding-top: 35px; margin-top: 15px; }
        .date-time { font-family: 'Georgia', serif; font-size: 1.3rem; color: #4a524d; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .address { font-size: 1.1rem; font-weight: 500; color: #3a3f47; line-height: 1.7; max-width: 420px; margin: 0 auto; background: rgba(255, 255, 255, 0.85); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.9); }
    
        .map-btn{
            display:inline-block;
            margin-top:15px;
            padding:10px 20px;
            background:#5c6e65;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:0.3s;
        }

        .map-btn:hover{
            transform:translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

</style>
</head>
<body>

    <div class="clouds">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
    </div>

    <!-- Uzaktaki Dağlar (SVG ile çizildi) -->
    <div class="scenery">
        <svg class="mountains" viewBox="0 0 1000 300" preserveAspectRatio="none">
            <!-- Sol Dağ (Daha geride) -->
            <path d="M-100,300 L200,80 L500,300 Z" fill="#b0c4de" opacity="0.6"/>
            <!-- Sol Dağ Kar -->
            <path d="M200,80 L150,140 L180,130 L200,160 L220,130 L250,140 Z" fill="#ffffff" opacity="0.8"/>

            <!-- Sağ Dağ (Daha önde ve büyük) -->
            <path d="M300,300 L700,40 L1200,300 Z" fill="#9fb6d6" opacity="0.7"/>
            <!-- Sağ Dağ Kar -->
            <path d="M700,40 L630,120 L660,110 L700,150 L730,110 L780,130 Z" fill="#ffffff" opacity="0.9"/>
        </svg>
    </div>

    <!-- Alt kısımdaki Isparta Gülleri -->
    <div class="roses-container">
        <div class="rose">🌹</div>
        <div class="rose">🌿</div>
        <div class="rose">🌹</div>
        <div class="rose">🌿</div>
        <div class="rose">🌹</div>
        <div class="rose">🌿</div>
        <div class="rose">🌹</div>
        <div class="rose">🌿</div>
        <div class="rose">🌹</div>
    </div>

    <!-- Ana Davetiye Kartı -->
    <div class="wrapper">
        <div class="leaf-icon">🌿</div>
        <h1>Nikâha Doğru</h1>
        
        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <label>Gün</label>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <label>Saat</label>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <label>Dakika</label>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <label>Saniye</label>
            </div>
        </div>
        
        <div class="details">
            <div class="date-time">
                <span>📅 18 Temmuz 2026</span>
                <span>•</span>
                <span>🕒 14:30</span>
            </div>
            <div class="address">
                📍 Isparta Öğretmenevi
            </div>

            <a href="https://maps.app.goo.gl/P8PJv9Bk6fXCECYV6"
               target="_blank"
               class="map-btn">
               🗺️ Yol Tarifi Al
            </a>
        </div>
    </div>

    <script>
        const targetDate = new Date("2026-07-18T14:30:00").getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.querySelector(".countdown").innerHTML = 
                    "<div style='font-size: 1.6rem; color: #4a524d; font-family: Georgia, serif; font-style: italic;'>O büyük gün geldi! ✨</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);
    </script>

</body>
</html>
